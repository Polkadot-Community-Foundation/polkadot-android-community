name: Release

# Builds and publishes a signed release APK when a v* tag is pushed.
# Mirrors the toolchain documented in docs/DEPLOYMENT.md §2-§6.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   RELEASE_KEYSTORE_BASE64      base64 of release_key.jks  (`base64 -w0 release_key.jks`)
#   RELEASE_KEYSTORE_PASS        keystore store password
#   RELEASE_KEYSTORE_KEY_ALIAS   key alias
#   RELEASE_KEYSTORE_KEY_PASS    key password
#   GOOGLE_SERVICES_JSON_BASE64  base64 of app/src/release/google-services.json
#   GOOGLE_OAUTH_ID              Google OAuth client id        (throwing secret)
#   GOOGLE_PROJECT_ID            Google Cloud project id       (throwing secret)
#   W3S_AUTH_KEY                 Web3 Summit auth keypair seed (throwing secret)
# Optional: SENTRY_ORG, SENTRY_PROJECT, LOG_COLLECTION_EMAIL.
#
# Optional (PCF downloads host — publishes the signed APK to
# get.polkadotcommunity.foundation, see PCF/pcf-infra terraform/downloads.tf):
#   R2_UPLOAD_TOKEN              Cloudflare API token, R2 Object R/W on pcf-downloads
#   CLOUDFLARE_ACCOUNT_ID        account owning the bucket
# If R2_UPLOAD_TOKEN is unset the upload step is skipped (GitHub Release still runs).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Product flavor to build (gp = Google services, vanilla = no GMS / F-Droid target)'
        type: choice
        default: gp
        options: [gp, vanilla]

permissions:
  contents: write

env:
  NDK_VERSION: "29.0.14206865"
  FLAVOR: ${{ github.event.inputs.flavor || 'gp' }}
  # true only when the R2 upload token is configured — gates the downloads-host step
  HAS_R2: ${{ secrets.R2_UPLOAD_TOKEN != '' }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}" "platforms;android-36"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > release_key.jks

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p app/src/release
          echo "$GS_B64" | base64 --decode > app/src/release/google-services.json

      - name: Assemble ${{ env.FLAVOR }} release APK
        env:
          # versionCode is driven by the run number (the repo's CI_BUILD_ID mechanism)
          CI_BUILD_ID: ${{ github.run_number }}
          # release signing
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release_key.jks
          RELEASE_KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
          RELEASE_KEYSTORE_KEY_ALIAS: ${{ secrets.RELEASE_KEYSTORE_KEY_ALIAS }}
          RELEASE_KEYSTORE_KEY_PASS: ${{ secrets.RELEASE_KEYSTORE_KEY_PASS }}
          # the dev signingConfig is read at configuration time even for a release
          # build; it is never used to sign a release variant, so placeholders suffice.
          CI_KEYSTORE_PASS: placeholder
          CI_KEYSTORE_KEY_ALIAS: placeholder
          CI_KEYSTORE_KEY_PASS: placeholder
          # throwing app secrets (readSecret)
          GOOGLE_OAUTH_ID: ${{ secrets.GOOGLE_OAUTH_ID }}
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          W3S_AUTH_KEY: ${{ secrets.W3S_AUTH_KEY }}
          # optional
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          LOG_COLLECTION_EMAIL: ${{ secrets.LOG_COLLECTION_EMAIL }}
        run: |
          FLAVOR_CAP="$(echo "${FLAVOR^}")"
          ./gradlew "assemble${FLAVOR_CAP}Release" --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find "app/build/outputs/apk/${FLAVOR}/release" -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.FLAVOR }}-release
          path: ${{ steps.apk.outputs.path }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true

      # Publish the signed APK to the PCF downloads host (R2 bucket pcf-downloads,
      # served at get.polkadotcommunity.foundation). Only the gp flavor (the
      # Google-services build) is the public download; vanilla is the F-Droid
      # target and is not hosted here. Skipped when R2_UPLOAD_TOKEN is unset.
      - name: Publish APK to downloads host
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_R2 == 'true' && env.FLAVOR == 'gp' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.R2_UPLOAD_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BUCKET: pcf-downloads
          APK: ${{ steps.apk.outputs.path }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="polkadot-android-${VERSION}.apk"
          CT="application/vnd.android.package-archive"
          sha256sum "$APK" | awk '{print $1}' > "$NAME.sha256"
          # versioned artifact + checksum sidecar + stable latest pointer
          npx --yes wrangler@3 r2 object put "$BUCKET/android/$NAME"        --file="$APK" --content-type="$CT"
          npx --yes wrangler@3 r2 object put "$BUCKET/android/$NAME.sha256" --file="$NAME.sha256" --content-type="text/plain"
          npx --yes wrangler@3 r2 object put "$BUCKET/android/latest.apk"   --file="$APK" --content-type="$CT"
          {
            echo "### Published to downloads host"
            echo "- https://get.polkadotcommunity.foundation/android/$NAME"
            echo "- https://get.polkadotcommunity.foundation/android/latest.apk"
            echo "- sha256: $(cat "$NAME.sha256")"
          } >> "$GITHUB_STEP_SUMMARY"
