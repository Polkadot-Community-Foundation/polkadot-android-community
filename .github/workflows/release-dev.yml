name: Release (Dev)

# Builds the public DEV variant — a builder/preview build pointed at the bespoke
# Paseo testnet chain set and (optionally) published. The `dev` buildType uses the
# dedicated DEV testnet environment (common/build.gradle.kts sets TESTNET_ENVIRONMENT=DEV
# for it), which MIRRORS NIGHTLY — it reads the `chains_v2` Remote Config key and resolves
# chains by the fixed ids nightly-relay / nightly-ah / nightly-people / nightly-bulletin —
# but is a distinct TestnetEnvironment value. It differs from nightly in identity + Firebase:
#   - applicationId = io.pcf.polkadotapp.dev (set via androidComponents in app/build.gradle.kts;
#     installs side-by-side with prod and with the io.paritytech.polkadotapp.nightly build).
#   - its own Firebase app (1:165923692956:android:ec22ad44f6b3de6ed72859) in the shared
#     polkadot-community-foundation project (# 165923692956, alongside prod io.pcf.polkadotapp,
#     .nightly and .debug) → its own google-services.json, and an RC condition
#     `App ID == io.pcf.polkadotapp.dev` serves the Paseo values
#     (summit-deployer-skills guides/_tools/paseo-remote-config.json). Keep prod RC defaults sacred.
#   - dev signs with the *dev* signingConfig, so the CI_KEYSTORE_* secrets below must be REAL
#     (matching the provided keystore), not placeholders.
# This pipeline leaves the production release.yml AND the nightly release-paseo.yml untouched.
#
# Required repository secrets:
#   DEV_KEYSTORE_BASE64             base64 of the signing keystore (`base64 -w0 key.jks`)
#   CI_KEYSTORE_PASS               keystore store password   (dev signingConfig)
#   CI_KEYSTORE_KEY_ALIAS          key alias
#   CI_KEYSTORE_KEY_PASS           key password
#   GOOGLE_SERVICES_JSON_DEV_BASE64 base64 of the DEV Firebase app's google-services.json
#   GOOGLE_OAUTH_ID                Google OAuth client id   (throwing secret)
#   GOOGLE_PROJECT_ID              Google Cloud project id  (throwing secret)
#   W3S_AUTH_KEY                   auth keypair seed (hex)  (throwing secret; use a FRESH Paseo-only key)
# Optional: DEV_FUNDING_MNEMONIC (faucet; defaults to the public substrate dev seed),
#   SENTRY_ORG, SENTRY_PROJECT, LOG_COLLECTION_EMAIL,
#   R2_UPLOAD_TOKEN + CLOUDFLARE_ACCOUNT_ID (publish APK to the PCF downloads host).

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Product flavors to build (gp = Google services, vanilla = no GMS)'
        type: choice
        default: gp vanilla
        options: [gp vanilla, gp, vanilla]
  push:
    tags: ['dev-v*']

permissions:
  contents: write

env:
  NDK_VERSION: "29.0.14206865"
  # space-separated list; the workflow_dispatch input can narrow it to one flavor
  FLAVORS: ${{ github.event.inputs.flavor || 'gp vanilla' }}
  HAS_R2: ${{ secrets.R2_UPLOAD_TOKEN != '' }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}" "platforms;android-36"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.DEV_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > dev_key.jks

      - name: Decode google-services.json (dev source set)
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev
          echo "$GS_B64" | base64 --decode > app/src/dev/google-services.json

      - name: Assemble dev APKs (${{ env.FLAVORS }}, Paseo)
        env:
          CI_BUILD_ID: ${{ github.run_number }}
          # dev signs with the dev signingConfig → point it at the decoded keystore
          # with REAL credentials (used at build time, unlike a release build).
          DEV_KEYSTORE_FILE: ${{ github.workspace }}/dev_key.jks
          CI_KEYSTORE_PASS: ${{ secrets.CI_KEYSTORE_PASS }}
          CI_KEYSTORE_KEY_ALIAS: ${{ secrets.CI_KEYSTORE_KEY_ALIAS }}
          CI_KEYSTORE_KEY_PASS: ${{ secrets.CI_KEYSTORE_KEY_PASS }}
          # release signingConfig is read at configuration time even though a dev
          # build never uses it — placeholders suffice here.
          RELEASE_KEYSTORE_PASS: placeholder
          RELEASE_KEYSTORE_KEY_ALIAS: placeholder
          RELEASE_KEYSTORE_KEY_PASS: placeholder
          # throwing app secrets (readSecret)
          GOOGLE_OAUTH_ID: ${{ secrets.GOOGLE_OAUTH_ID }}
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          W3S_AUTH_KEY: ${{ secrets.W3S_AUTH_KEY }}
          # faucet (optional; defaults to the public substrate dev seed when unset)
          NIGHTLY_FUNDING_MNEMONIC: ${{ secrets.DEV_FUNDING_MNEMONIC }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          LOG_COLLECTION_EMAIL: ${{ secrets.LOG_COLLECTION_EMAIL }}
        run: |
          TASKS=""
          for F in $FLAVORS; do TASKS="$TASKS assemble${F^}Dev"; done
          ./gradlew $TASKS --no-daemon --stacktrace

      - name: Locate APKs
        id: apk
        run: |
          find app/build/outputs/apk -path '*/dev/*.apk' -print
          GP=$(find app/build/outputs/apk/gp/dev -name '*.apk' 2>/dev/null | head -1)
          echo "gp=$GP" >> "$GITHUB_OUTPUT"

      - name: Upload gp APK artifact
        if: contains(env.FLAVORS, 'gp')
        uses: actions/upload-artifact@v4
        with:
          name: app-gp-dev-paseo
          path: app/build/outputs/apk/gp/dev/*.apk

      - name: Upload vanilla APK artifact
        if: contains(env.FLAVORS, 'vanilla')
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-dev-paseo
          path: app/build/outputs/apk/vanilla/dev/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/dev-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: app/build/outputs/apk/*/dev/*.apk
          generate_release_notes: true
          prerelease: true

      - name: Publish APK to downloads host
        if: ${{ startsWith(github.ref, 'refs/tags/dev-v') && env.HAS_R2 == 'true' && contains(env.FLAVORS, 'gp') }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.R2_UPLOAD_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BUCKET: pcf-downloads
          APK: ${{ steps.apk.outputs.gp }}
        run: |
          VERSION="${GITHUB_REF_NAME#dev-v}"
          NAME="polkadot-android-dev-${VERSION}.apk"
          CT="application/vnd.android.package-archive"
          sha256sum "$APK" | awk '{print $1}' > "$NAME.sha256"
          npx --yes wrangler@3 r2 object put "$BUCKET/android/dev/$NAME"        --file="$APK" --content-type="$CT"
          npx --yes wrangler@3 r2 object put "$BUCKET/android/dev/$NAME.sha256" --file="$NAME.sha256" --content-type="text/plain"
          npx --yes wrangler@3 r2 object put "$BUCKET/android/dev/latest.apk"   --file="$APK" --content-type="$CT"
          {
            echo "### Published Paseo dev build to downloads host"
            echo "- https://get.polkadotcommunity.foundation/android/dev/$NAME"
            echo "- https://get.polkadotcommunity.foundation/android/dev/latest.apk"
          } >> "$GITHUB_STEP_SUMMARY"
